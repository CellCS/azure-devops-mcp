name: PR Verify

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify Python Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Syntax/build sanity
        run: uv run python -m compileall main.py app

      - name: Import sanity check
        run: uv run python -c "import main; print('main import ok')"

      - name: Static security scan (Bandit)
        run: uv run bandit -r app main.py

      - name: Dependency vulnerability scan
        run: uv run pip-audit

      - name: Run tests (if present)
        run: |
          if [ -d tests ]; then
            uv run pytest
          else
            echo "No tests directory found, skipping tests."
          fi
